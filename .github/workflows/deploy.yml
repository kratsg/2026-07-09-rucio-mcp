name: Deploy slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp presentation.html _site/index.html
          cp styles.css _site/
          if [ -d images ]; then cp -r images _site/; fi
          # stamp the deployed build so you can tell which version is live
          SHORT_SHA="${GITHUB_SHA::7}"
          STAMP="${SHORT_SHA} · $(date -u +%Y-%m-%d)"
          sed -i "s|<span id=\"buildstamp\">dev</span>|<span id=\"buildstamp\"><a href=\"https://github.com/kratsg/2026-07-09-rucio-mcp/commit/${GITHUB_SHA}\">${STAMP}</a></span>|" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
